name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        nginx:
        - "1.31.0"
        distro:
        - trixie
        flavor:
        - utex
        experimental:
        - false

    steps:
    - uses: actions/checkout@v3
    - uses: docker/setup-qemu-action@v2
    - uses: docker/setup-buildx-action@v2
    - uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    - run: |
        NGINX_TAG="${{ matrix.nginx }}-${{ matrix.distro }}"
        IMAGE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_NAME="ghcr.io/${IMAGE_OWNER}/nginx"
        IMAGE_TAG="${{ matrix.nginx }}-${{ matrix.distro }}-${{ matrix.flavor }}-${{ github.run_number }}"
        WITH_LUA=$(jq -er '.flavors[] | select(.name == "${{ matrix.flavor }}") | .with_lua // false' flavors.json)
        echo MODULES=$(jq -er '.flavors[] | select(.name == "${{ matrix.flavor }}") | .modules | join(",")' flavors.json) >> $GITHUB_ENV
        echo LUA_MODULES=$(jq -er '.flavors[] | select(.name == "${{ matrix.flavor }}") | [ .lua_modules[]? ] | join(",")' flavors.json) >> $GITHUB_ENV
        echo OPENRESTY_PKG_VERSION=$(jq -r '.flavors[] | select(.name == "${{ matrix.flavor }}") | .openresty_package_version // ""' flavors.json) >> $GITHUB_ENV
        echo DOCKER_TAGS=${IMAGE_NAME}:${IMAGE_TAG} >> $GITHUB_ENV
        echo IMAGE_NAME=${IMAGE_NAME} >> $GITHUB_ENV
        echo IMAGE_TAG=${IMAGE_TAG} >> $GITHUB_ENV
        echo NGINX_TAG=${NGINX_TAG} >> $GITHUB_ENV
        echo WITH_LUA=${WITH_LUA} >> $GITHUB_ENV
    - uses: docker/build-push-action@v4
      with:
        load: true
        tags: ${{ env.DOCKER_TAGS }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache
        build-args: |
          nginx_version=${{ env.NGINX_TAG }}
          with_lua=${{ env.WITH_LUA }}
          openresty_package_version=${{ env.OPENRESTY_PKG_VERSION }}
          modules=${{ env.MODULES }}
          lua_modules=${{ env.LUA_MODULES }}
    - run: make test flavor=${{ matrix.flavor }} nginx_version=${{ env.NGINX_TAG }} image_name=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
    - uses: docker/login-action@v2
      if: github.event_name != 'pull_request'
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v4
      if: github.event_name != 'pull_request'
      with:
        push: true
        tags: ${{ env.DOCKER_TAGS }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache
        platforms: linux/amd64,linux/arm64
        build-args: |
          nginx_version=${{ env.NGINX_TAG }}
          with_lua=${{ env.WITH_LUA }}
          openresty_package_version=${{ env.OPENRESTY_PKG_VERSION }}
          modules=${{ env.MODULES }}
          lua_modules=${{ env.LUA_MODULES }}